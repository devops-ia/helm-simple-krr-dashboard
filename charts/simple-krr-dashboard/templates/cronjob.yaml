{{- if .Values.job.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "simple-krr-dashboard.fullname" . }}-get-krr-report
  {{- with .Values.job.cronJobAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  labels:
    {{- include "simple-krr-dashboard.labels" . | nindent 4 }}
    {{- with .Values.job.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  schedule: {{ .Values.job.schedule | quote }}
  concurrencyPolicy: {{ .Values.job.concurrencyPolicy | quote }}
  successfulJobsHistoryLimit: {{ .Values.job.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.job.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      completions: {{ .Values.job.completions }}
      parallelism: {{ .Values.job.parallelism }}
      completionMode: {{ .Values.job.completionMode | quote }}
      backoffLimit: {{ .Values.job.backoffLimit }}
      backoffLimitPerIndex: {{ .Values.job.backoffLimitPerIndex }}
      {{- if .Values.job.maxFailedIndexes }}
      maxFailedIndexes: {{ .Values.job.maxFailedIndexes }}
      {{- end }}
      template:
        metadata:
          {{- with .Values.job.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          labels:
            {{- include "simple-krr-dashboard.selectorLabels" . | nindent 12 }}
            {{- with .Values.jobpodLabels }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        spec:
          serviceAccountName: {{ include "simple-krr-dashboard.serviceAccountName" . }}
          imagePullSecrets:
            {{- toYaml .Values.job.imagePullSecrets | nindent 12 }}
          restartPolicy: {{ .Values.job.restartPolicy | quote }}
          {{- with .Values.job.podSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          initContainers:
          - name: kubectl-provider
            image: "{{ .Values.job.kubectlInitContainer.image.repository }}:{{ .Values.job.kubectlInitContainer.image.tag }}"
            imagePullPolicy: {{ .Values.job.kubectlInitContainer.image.pullPolicy | quote }}
            command: ["cp", "/usr/local/bin/kubectl", "/kubectl-bin/kubectl"]
            securityContext:
              runAsUser: 0
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
            volumeMounts:
            - name: kubectl-bin
              mountPath: /kubectl-bin
          containers:
          - name: krr
            image: "{{ .Values.job.image.repository }}:{{ .Values.job.image.tag | default "latest" }}"
            imagePullPolicy: {{ .Values.job.image.pullPolicy | quote }}
            {{- with .Values.job.securityContext }}
            securityContext:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            {{- if .Values.job.args }}
            args:
              {{- toYaml .Values.job.args | nindent 12 }}
            {{- else }}
            args:
              - |
                export PATH="/kubectl-bin:$PATH" && \
                python krr.py simple --fileoutput report.table.csv --use-oomkill-data --formatter csv {{ .Values.job.krrExtraArguments | default "" }} && \
                DASHBOARD_POD=$(kubectl -n {{ .Release.Namespace }} get pods -l app.kubernetes.io/name={{ include "simple-krr-dashboard.fullname" . }} -l helm.sh/chart={{ .Chart.Name }}-{{ .Chart.Version }} -o jsonpath='{.items[0].metadata.name}') && \
                grep -v "get-krr-report" report.table.csv > report.table.csv.tmp && \
                kubectl -n {{ .Release.Namespace }} cp report.table.csv.tmp $DASHBOARD_POD:{{ .Values.env.KUBERNETES_DASHBOARD_CSV_PATH | default "/reports/report.table.csv" }}.new && \
                kubectl -n {{ .Release.Namespace }} exec $DASHBOARD_POD -- mv {{ .Values.env.KUBERNETES_DASHBOARD_CSV_PATH | default "/reports/report.table.csv" }}.new {{ .Values.env.KUBERNETES_DASHBOARD_CSV_PATH | default "/reports/report.table.csv" }}
            {{- end }}
            {{- with .Values.job.command }}
            command:
              {{- toYaml . | nindent 12 }}
            {{- end }}
            envFrom:
              {{- if .Values.job.envFromFiles }}
              {{- tpl (toYaml .Values.job.envFromFiles) . | nindent 12 }}
              {{- end }}
            env:
              # Variables from secrets have precedence
              {{- $envList := dict -}}
              {{- if .Values.job.envFromSecrets }}
              {{- range $key, $value := .Values.job.envFromSecrets }}
              {{- if not (hasKey $envList $key) }}
              - name: {{ $key | upper }}
                valueFrom:
                  secretKeyRef:
                    name: {{ $value.name }}
                    key: {{ $value.key | default $key }}
              {{- $_ := set $envList $key true }}
              {{- end }}
              {{- end }}
              {{- end }}
              # Variables from configmap have precedence
              {{- if .Values.job.envFromConfigMap }}
              {{- range $key, $value := .Values.job.envFromConfigMap }}
              {{- if not (hasKey $envList $key) }}
              - name: {{ $key | upper }}
                valueFrom:
                  configMapKeyRef:
                    name: {{ $value.name }}
                    key: {{ $value.key | default $key }}
              {{- $_ := set $envList $key true }}
              {{- end }}
              {{- end }}
              {{- end }}
              # Add variables in plain text if they were not already added from secrets
              {{- if .Values.job.env }}
              {{- range $key, $value := .Values.job.env }}
              {{- if not (hasKey $envList $key) }}
              - name: {{ $key | upper }}
                value: {{ $value | quote }}
              {{- $_ := set $envList $key true }}
              {{- end }}
              {{- end }}
              {{- end }}
            resources:
              {{- toYaml .Values.job.resources | nindent 14 }}
            volumeMounts:
              {{- with .Values.job.volumeMounts }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
              - name: kubectl-bin
                mountPath: /kubectl-bin
          terminationGracePeriodSeconds: {{ .Values.job.terminationGracePeriodSeconds }}
          volumes:
            {{- with .Values.job.volumes }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            - name: kubectl-bin
              emptyDir: {}
          {{- with .Values.job.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.job.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.job.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.job.dnsConfig }}
          dnsConfig:
            {{- toYaml . | nindent 8 }}
          {{- end }}
          {{- with .Values.job.dnsPolicy }}
          dnsPolicy: {{ . }}
          {{- end }}
{{- end }}
